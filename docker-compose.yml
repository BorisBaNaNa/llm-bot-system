# Инфраструктура для Bot Service: брокер задач и хранилище.
# Сами сервисы (auth, celery-воркер, бот) запускаются локально через uv как
# отдельные процессы. Здесь только RabbitMQ и Redis - готовые образы без сборки.
#
# Запуск:  docker compose up -d
# RabbitMQ UI:  http://localhost:15672  (guest / guest)
#
# При локальном запуске сервисов хосты в .env должны указывать на localhost:
#   REDIS_URL=redis://localhost:6379/0
#   RABBITMQ_URL=amqp://guest:guest@localhost:5672//

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: llm_rabbitmq
    ports:
      - "5672:5672"     # порт брокера (AMQP)
      - "15672:15672"   # веб-интерфейс управления
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: llm_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
